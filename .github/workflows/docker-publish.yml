name: Build & Push Docker Image to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

# Cancel in-progress runs for the same branch
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # erikhinla/hermes-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs (speeds up rebuilds significantly)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HERMES_REPO=https://github.com/erikhinla/hermes-agent.git
            HERMES_BRANCH=main

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
